  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F8F9FC; color: #2C2012; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-7px); } }
    .fade-in { animation: fadeIn .3s ease; }
    .dot { animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    .card { transition: transform .15s, box-shadow .15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(27,42,74,.12) !important; }
    .tabbtn { transition: all .2s; cursor: pointer; }
    .tabbtn:hover { opacity: .8; }
    .action-btn { transition: opacity .15s, transform .1s; cursor: pointer; }
    .action-btn:hover { opacity: .88; transform: scale(1.02); }
    input:focus, textarea:focus { outline: none; border-color: #C9A84C !important; box-shadow: 0 0 0 3px rgba(201,168,76,.15); }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(27,42,74,.15); border-radius: 4px; }

</head>

  {

  "Contacted": { bg: "rgba(27,42,74,.08)",   color: OA },

// ── Component ──
function App() {
  const [isActivated,    setIsActivated]    = React.useState(false);
  const [loginInput,     setLoginInput]     = React.useState("");
  const [activeTab,      setActiveTab]      = React.useState("conversations");
  const [openThread,     setOpenThread]     = React.useState(null);

  // ── SPLASH SCREEN ──
  if (!isActivated) {
    return (
      <div style={{ minHeight: "100vh", background: `linear-gradient(160deg, ${W} 0%, ${WM} 50%, ${OA} 100%)`, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", inset: 0, background: "repeating-linear-gradient(105deg, transparent, transparent 80px, rgba(201,168,76,.04) 80px, rgba(201,168,76,.04) 82px)", pointerEvents: "none" }} />
        <div style={{ position: "absolute", inset: 0, background: "repeating-linear-gradient(180deg, transparent, transparent 8px, rgba(0,0,0,.03) 8px, rgba(0,0,0,.03) 10px)", pointerEvents: "none" }} />

        <div className="fade-in" style={{ background: CR, borderRadius: 16, padding: "48px 44px", maxWidth: 440, width: "100%", textAlign: "center", boxShadow: "0 32px 80px rgba(0,0,0,.35)" }}>
          <div style={{ marginBottom: 6 }}>
            <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 44, fontWeight: 900, color: W, letterSpacing: "-1px" }}>Fresh Flooring</span>

          </div>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 30 }}>
            <div style={{ height: 1, flex: 1, background: BD }} />
            <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 14, fontStyle: "italic", color: "#7A6652", whiteSpace: "nowrap" }}>powered by ellie</span>
            <div style={{ height: 1, flex: 1, background: BD }} />
          </div>

          <p style={{ fontSize: 12, color: "#9a8070", marginBottom: 28 }}>Sign in to access your dashboard</p>

          <div style={{ textAlign: "left", display: "flex", flexDirection: "column", gap: 14, marginBottom: 24 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: W, letterSpacing: "1px", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Email</label>
              <input placeholder="you@freshflooring.com" type="email"
                style={{ width: "100%", border: `1.5px solid ${BD}`, borderRadius: 8, padding: "12px 14px", fontSize: 14, fontFamily: "inherit", background: WW, color: W }} />
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: W, letterSpacing: "1px", textTransform: "uppercase", display: "block", marginBottom: 6 }}>Password</label>
              <input value={loginInput} onChange={e => setLoginInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && setIsActivated(true)}
                placeholder="••••••••" type="password"
                style={{ width: "100%", border: `1.5px solid ${BD}`, borderRadius: 8, padding: "12px 14px", fontSize: 14, fontFamily: "inherit", background: WW, color: W }} />
            </div>
          </div>

          <button className="action-btn" onClick={() => setIsActivated(true)}
            style={{ width: "100%", background: `linear-gradient(135deg, ${W}, ${WM})`, color: CR, border: "none", borderRadius: 10, padding: "15px 0", fontSize: 15, fontWeight: 800, fontFamily: "inherit", boxShadow: "0 4px 18px rgba(27,42,74,.35)", letterSpacing: "0.3px" }}>

          <p style={{ marginTop: 16, fontSize: 11, color: "rgba(27,42,74,.35)" }}>Secured by Ellie AI · meetellieai.com</p>
        </div>
      </div>
    );
  }

  const totalConvos  = conversations.length;
  const totalLeads   = conversations.filter(c => c.leadCaptured).length;

  // ── MAIN DASHBOARD ──
  return (
    <div style={{ minHeight: "100vh", background: WW }}>

      {/* ── HEADER ── */}

              <div>

              </div>
            </div>
            {/* Leads Captured */}
            <div style={{ background: "rgba(255,255,255,.1)", border: "1px solid rgba(245,239,230,.12)", borderRadius: 10, padding: "14px 18px", display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ fontSize: 28 }}>🎯</div>
              <div>
                <div style={{ fontFamily: "'Playfair Display', serif", color: CR, fontWeight: 700, fontSize: 32, lineHeight: 1 }}>{totalLeads}</div>

              </button>
            )}

            {/* Thread view */}
            {openThread !== null ? (() => {
              const convo = conversations.find(c => c.id === openThread);
              return (
                <div style={{ background: "#fff", borderRadius: 12, border: `1px solid ${BD}`, overflow: "hidden", boxShadow: "0 4px 20px rgba(27,42,74,.07)" }}>
                  {/* Thread header */}
                  <div style={{ background: `linear-gradient(135deg, ${W}, ${WM})`, padding: "16px 22px", display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ width: 44, height: 44, borderRadius: "50%", background: "rgba(201,168,76,.25)", border: `2px solid ${H}`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Playfair Display',serif", fontSize: 16, fontWeight: 700, color: CR, flexShrink: 0 }}>
                      {convo.name === "Unknown Caller" ? "?" : convo.name.split(" ").map(n=>n[0]).join("")}

                    <div>
                      <div style={{ fontWeight: 700, color: CR, fontSize: 16 }}>{convo.name}</div>

                    </div>
                  </div>

                  {/* SMS thread */}
                  <div style={{ padding: "20px 22px", display: "flex", flexDirection: "column", gap: 12, background: WW, minHeight: 300 }}>
                    {convo.thread.map((msg, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: msg.from === "customer" ? "flex-end" : "flex-start", alignItems: "flex-end", gap: 8 }}>
                        {msg.from === "ellie" && (
                          <div style={{ width: 30, height: 30, borderRadius: "50%", background: W, border: `1.5px solid ${H}`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Playfair Display',serif", fontSize: 12, fontWeight: 700, color: H, flexShrink: 0 }}>E</div>
                        )}
                        <div style={{
                          background: msg.from === "customer" ? W : "#fff",
                          color: msg.from === "customer" ? CR : W,
                          borderRadius: msg.from === "customer" ? "18px 18px 4px 18px" : "18px 18px 18px 4px",

                          border: msg.from === "customer" ? "none" : `1px solid ${BD}`,
                          boxShadow: "0 1px 4px rgba(27,42,74,.07)"
                        }}>
                          {msg.text}
                        </div>
                        {msg.from === "customer" && (
                          <div style={{ width: 30, height: 30, borderRadius: "50%", background: "rgba(27,42,74,.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: W, flexShrink: 0 }}>

                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: W }} /> Ellie
                    </span>
                    <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: "rgba(27,42,74,.2)" }} /> Customer
                    </span>
                  </div>
                </div>
              );
            })() : (
              /* Conversation list */
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, color: W }}>All Conversations</h2>
                  <span style={{ fontSize: 12, color: "#9a8070", fontWeight: 600 }}>{conversations.length} total · {totalLeads} leads captured</span>

                    style={{ background: "#fff", borderRadius: 10, padding: "16px 20px", border: `1px solid ${BD}`, display: "flex", alignItems: "center", gap: 16, cursor: "pointer", boxShadow: "0 2px 8px rgba(27,42,74,.04)" }}>

                    {/* Avatar */}
                    <div style={{ width: 48, height: 48, borderRadius: "50%", flexShrink: 0,
                      background: convo.leadCaptured ? "rgba(201,168,76,.15)" : "rgba(27,42,74,.06)",
                      border: `2px solid ${convo.leadCaptured ? H : "rgba(27,42,74,.12)"}`,
                      display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: W }}>
                      {convo.name === "Unknown Caller" ? "?" : convo.name.split(" ").map(n=>n[0]).join("")}
                    </div>

                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <span style={{ fontWeight: 700, fontSize: 15, color: W }}>{convo.name}</span>
                        <span style={{ fontSize: 11, color: "#9a8070", flexShrink: 0, marginLeft: 12 }}>{convo.date}</span>
                      </div>
                      <div style={{ fontSize: 13, color: "#9a8070", marginTop: 2 }}>{convo.phone}</div>
                      <div style={{ fontSize: 13, color: OA, fontWeight: 600, marginTop: 4 }}>🪵 {convo.summary}</div>
                    </div>

                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, flexShrink: 0 }}>
                      <span style={{ fontSize: 11, fontWeight: 800, borderRadius: 20, padding: "3px 12px",
                        background: convo.leadCaptured ? "rgba(201,168,76,.15)" : "rgba(27,42,74,.06)",
                        color: convo.leadCaptured ? W : "#9a8070" }}>
                        {convo.leadCaptured ? "✓ Lead Captured" : "No Response"}
                      </span>
                      <span style={{ fontSize: 11, color: H, fontWeight: 600 }}>View thread →</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ══ LEAD PIPELINE TAB ══ */}
        {activeTab === "pipeline" && (
          <div className="fade-in">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, color: W }}>Lead Pipeline</h2>
              <span style={{ fontSize: 12, color: "#9a8070", fontWeight: 600 }}>{leads.length} leads delivered to Fresh Flooring</span>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {leads.map((lead, i) => (
                <div key={i} style={{ background: "#fff", borderRadius: 10, padding: "20px 24px", border: `1px solid ${BD}`, boxShadow: "0 2px 8px rgba(27,42,74,.04)" }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 16 }}>

                    {/* Avatar */}
                    <div style={{ width: 48, height: 48, borderRadius: "50%", flexShrink: 0,
                      background: "rgba(201,168,76,.15)", border: `2px solid ${H}`,
                      display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: W }}>
                      {lead.name.split(" ").map(n=>n[0]).join("")}
                    </div>

                    {/* Details */}
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 16, color: W }}>{lead.name}</div>
                          <div style={{ fontSize: 13, color: "#9a8070", marginTop: 2 }}>{lead.phone}</div>
                        </div>
                        <span style={{ fontSize: 11, fontWeight: 800, borderRadius: 20, padding: "4px 14px",
                          background: statusColors[lead.status]?.bg,
                          color: statusColors[lead.status]?.color }}>
                          {lead.status}
                        </span>
                      </div>

                      <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                        <div style={{ background: WW, borderRadius: 8, padding: "10px 14px", border: `1px solid ${BD}` }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: "#9a8070", textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 4 }}>Service</div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: W }}>🪵 {lead.service}</div>
                        </div>
                        <div style={{ background: WW, borderRadius: 8, padding: "10px 14px", border: `1px solid ${BD}` }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: "#9a8070", textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 4 }}>Callback Day</div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: W }}>📅 {lead.callbackDay}</div>
                        </div>
                        <div style={{ background: "rgba(201,168,76,.08)", borderRadius: 8, padding: "10px 14px", border: `1px solid rgba(201,168,76,.2)` }}>
                          <div style={{ fontSize: 10, fontWeight: 700, color: "#9a8070", textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 4 }}>Delivered to Fresh Flooring</div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: W }}>✅ {lead.notified}</div>
                          <div style={{ fontSize: 11, color: "#9a8070", marginTop: 2 }}>{lead.notifyMethod}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Summary bar */}
            <div style={{ marginTop: 16, padding: "16px 20px", background: CR, border: `1px solid rgba(201,168,76,.3)`, borderRadius: 10, display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 22 }}>✦</span>
              <span style={{ fontSize: 13, color: W, fontWeight: 600, lineHeight: 1.5 }}>
                Every lead above was captured by Ellie and delivered directly to Fresh Flooring via SMS and email — automatically, with no missed calls going unanswered.
              </span>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
