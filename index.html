<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ellie 🌸 AI Revenue Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #fdf8f7; color: #2d2d2d; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    .fade-in { animation: fadeIn .3s ease; }
    .dot { animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    .card { transition: transform .15s, box-shadow .15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(232,130,122,.15) !important; }
    .btn { transition: opacity .15s, transform .1s; }
    .btn:hover { opacity: .88; transform: scale(1.02); }
    textarea:focus, input:focus { border-color: #e8827a !important; box-shadow: 0 0 0 3px rgba(232,130,122,.15); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SYSTEM_PROMPT = `You are Ellie, a warm and friendly AI assistant for a service-based small business. Reply to missed calls via text. Keep messages concise (under 160 chars), warm, and friendly. Always ask what the customer needs help with to keep the conversation going. Never ask when to call back - keep it as a text conversation. Sign off as "- Ellie" on behalf of the business.`;

const mockCalls = [
  { id: 1, name: "Mike Henderson", phone: "(416) 555-0182", time: "2 min ago", avatar: "MH", service: "Lawn mowing quote", status: "new" },
  { id: 2, name: "Unknown Caller", phone: "(416) 555-0341", time: "12 min ago", avatar: "?", service: null, status: "new" },
  { id: 3, name: "Dave Kowalski", phone: "(416) 555-0907", time: "1 hr ago", avatar: "DK", service: "Spring cleanup", status: "replied" },
  { id: 4, name: "Sandra Pope", phone: "(416) 555-0254", time: "3 hrs ago", avatar: "SP", service: "Hedge trimming", status: "replied" },
];

const leads = [
  { name: "Mike Henderson", phone: "(416) 555-0182", interest: "Lawn mowing", value: "$380", status: "Hot" },
  { name: "Unknown Caller", phone: "(416) 555-0341", interest: "Unknown", value: "?", status: "Warm" },
  { name: "Tony Ricci", phone: "(416) 555-0611", interest: "Seasonal package", value: "$220", status: "Hot" },
];

const tabs = [
  { id: "calls", label: "Missed Calls", icon: "📞", badge: 2 },
  { id: "leads", label: "Leads", icon: "🎯", badge: 0 },
  { id: "faq", label: "Chat with Ellie", icon: "💬", badge: 0 },
];

function Ellie() {
  const [apiKey, setApiKey] = React.useState("");
  const [apiKeyInput, setApiKeyInput] = React.useState("");
  const [isActivated, setIsActivated] = React.useState(false);
  const [activeTab, setActiveTab] = React.useState("calls");
  const [selectedCall, setSelectedCall] = React.useState(null);
  const [isGenerating, setIsGenerating] = React.useState(false);
  const [editedMsg, setEditedMsg] = React.useState("");
  const [sentIds, setSentIds] = React.useState([]);
  const [businessName, setBusinessName] = React.useState("Durham's Finest Lawncare");
  const [chatInput, setChatInput] = React.useState("");
  const [chatMessages, setChatMessages] = React.useState([
    { role: "ellie", text: "Hi! I'm Ellie 🌸 Ask me anything your customers might ask!" }
  ]);
  const [isChatting, setIsChatting] = React.useState(false);
  const [showKeyModal, setShowKeyModal] = React.useState(false);
  const chatEndRef = React.useRef(null);

  React.useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [chatMessages]);

  const activate = () => {
    const key = apiKeyInput.trim();
    if (key.length > 10) {
      setApiKey(key);
      setIsActivated(true);
      setShowKeyModal(false);
    } else {
      alert("Please enter your Anthropic API key");
    }
  };

  const callClaude = async (system, user) => {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 300,
        system,
        messages: [{ role: "user", content: user }],
        userApiKey: apiKey
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    return data.content?.map(c => c.text || "").join("") || "Sorry, try again!";
  };

  const generateReply = async (call) => {
    setSelectedCall(call);
    setEditedMsg("");
    setIsGenerating(true);
    const prompt = call.service
      ? `Customer ${call.name} (${call.phone}) called ${call.time} about: "${call.service}". Write a warm missed-call text reply for ${businessName}.`
      : `Unknown caller (${call.phone}) called ${call.time}. Write a warm missed-call text reply for ${businessName}.`;
    try {
      const text = await callClaude(SYSTEM_PROMPT, prompt);
      setEditedMsg(text);
    } catch(err) {
      setEditedMsg('API Error: ' + (err && err.message ? err.message : 'Check your API key'));
    }
    setIsGenerating(false);
  };

  const handleChat = async () => {
    if (!chatInput.trim()) return;
    const msg = chatInput.trim();
    setChatInput("");
    setChatMessages(prev => [...prev, { role: "user", text: msg }]);
    setIsChatting(true);
    try {
      const text = await callClaude(
        `You are Ellie, warm friendly AI assistant for ${businessName}. Answer customer questions helpfully and briefly. Sign off as "- Ellie"`,
        msg
      );
      setChatMessages(prev => [...prev, { role: "ellie", text }]);
    } catch(e) {
      setChatMessages(prev => [...prev, { role: "ellie", text: 'Error: ' + e.message }]);
    }
    setIsChatting(false);
  };

  // Activation screen
  if (!isActivated) {
    return (
      <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #e8827a 0%, #c76b91 100%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ background: "#fff", borderRadius: 24, padding: 48, maxWidth: 440, width: "100%", textAlign: "center", boxShadow: "0 24px 80px rgba(0,0,0,.18)" }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>🌸</div>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 40, fontWeight: 900, color: "#e8827a", marginBottom: 8 }}>Ellie</h1>
          <p style={{ color: "#8a8a8a", fontSize: 15, marginBottom: 32, fontWeight: 500 }}>AI Revenue Assistant for Small Business</p>
          <div style={{ textAlign: "left", marginBottom: 20 }}>
            <label style={{ fontSize: 12, fontWeight: 800, color: "#2d2d2d", letterSpacing: "1px", textTransform: "uppercase", display: "block", marginBottom: 8 }}>Anthropic API Key</label>
            <input
              value={apiKeyInput}
              onChange={e => setApiKeyInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && activate()}
              placeholder="sk-ant-..."
              type="password"
              style={{ width: "100%", border: "2px solid #f0e8e4", borderRadius: 12, padding: "14px 16px", fontSize: 15, fontFamily: "inherit", outline: "none" }}
            />
          </div>
          <button className="btn" onClick={activate}
            style={{ width: "100%", background: "linear-gradient(135deg, #e8827a, #c76b91)", color: "#fff", border: "none", borderRadius: 14, padding: "16px 0", fontSize: 16, fontWeight: 800, cursor: "pointer", fontFamily: "inherit" }}>
            Activate Ellie 🌸
          </button>
          <p style={{ marginTop: 16, fontSize: 12, color: "#aaa" }}>Get your key at console.anthropic.com</p>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#fdf8f7" }}>

      {/* API Key Modal */}
      {showKeyModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: 36, maxWidth: 420, width: "100%" }}>
            <h3 style={{ fontFamily: "'Fraunces',serif", fontSize: 22, marginBottom: 16 }}>Update API Key</h3>
            <input value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} placeholder="sk-ant-..." type="password"
              style={{ width: "100%", border: "2px solid #f0e8e4", borderRadius: 10, padding: "12px 14px", fontSize: 14, fontFamily: "inherit", outline: "none", marginBottom: 14 }} />
            <div style={{ display: "flex", gap: 10 }}>
              <button className="btn" onClick={() => setShowKeyModal(false)}
                style={{ flex: 1, background: "#f5f5f5", border: "none", borderRadius: 10, padding: "12px 0", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
              <button className="btn" onClick={activate}
                style={{ flex: 2, background: "#e8827a", color: "#fff", border: "none", borderRadius: 10, padding: "12px 0", fontWeight: 800, cursor: "pointer", fontFamily: "inherit" }}>Save Key</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #e8827a 0%, #c76b91 100%)", padding: "0 24px 0" }}>
        <div style={{ maxWidth: 960, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 0 14px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: "50%", background: "rgba(255,255,255,.25)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🌸</div>
              <div>
                <div style={{ fontFamily: "'Fraunces',serif", fontSize: 26, color: "#fff", fontWeight: 700 }}>Ellie</div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,.8)", letterSpacing: "2px", textTransform: "uppercase", fontWeight: 700 }}>AI Revenue Assistant</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", justifyContent: "flex-end" }}>
              <input value={businessName} onChange={e => setBusinessName(e.target.value)}
                style={{ background: "rgba(255,255,255,.2)", border: "1px solid rgba(255,255,255,.4)", borderRadius: 8, padding: "7px 12px", color: "#fff", fontSize: 13, fontFamily: "inherit", fontWeight: 700, width: 170, outline: "none" }} />
              <button className="btn" onClick={() => { setApiKeyInput(""); setShowKeyModal(true); }}
                style={{ background: "rgba(255,255,255,.25)", border: "2px solid rgba(255,255,255,.6)", borderRadius: 8, padding: "7px 14px", color: "#fff", fontSize: 12, fontWeight: 800, cursor: "pointer", fontFamily: "inherit" }}>
                🔑 API Key
              </button>
              <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,.2)", borderRadius: 20, padding: "5px 12px" }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#a8f0a8", boxShadow: "0 0 6px #a8f0a8" }} />
                <span style={{ color: "#fff", fontSize: 11, fontWeight: 800 }}>LIVE</span>
              </div>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, paddingBottom: 18 }}>
            {[{l:"Texts Sent",v:"12",i:"✉️"},{l:"Leads Captured",v:"8",i:"🎯"},{l:"Revenue Saved",v:"$2,840",i:"💰"},{l:"Reply Rate",v:"94%",i:"📈"}].map(s => (
              <div key={s.l} style={{ background: "rgba(255,255,255,.18)", borderRadius: 12, padding: "10px 14px", textAlign: "center" }}>
                <div>{s.i}</div>
                <div style={{ color: "#fff", fontWeight: 800, fontSize: 20, fontFamily: "'Fraunces',serif" }}>{s.v}</div>
                <div style={{ color: "rgba(255,255,255,.75)", fontSize: 10, fontWeight: 700 }}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ background: "#fff", borderBottom: "1px solid #f0e8e4", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", padding: "0 24px" }}>
          {tabs.map(t => (
            <button key={t.id} className="btn" onClick={() => { setActiveTab(t.id); setSelectedCall(null); }}
              style={{ padding: "14px 20px", border: "none", background: "transparent", fontFamily: "inherit", fontSize: 14, fontWeight: 700, cursor: "pointer", color: activeTab === t.id ? "#e8827a" : "#8a8a8a", borderBottom: activeTab === t.id ? "2.5px solid #e8827a" : "2.5px solid transparent", display: "flex", alignItems: "center", gap: 7, transition: "all .2s" }}>
              {t.icon} {t.label}
              {t.badge > 0 && <span style={{ background: "#e8827a", color: "#fff", borderRadius: 10, fontSize: 10, fontWeight: 800, padding: "1px 7px" }}>{t.badge}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 960, margin: "0 auto", padding: 24 }}>

        {activeTab === "calls" && (
          <div style={{ display: "grid", gridTemplateColumns: selectedCall ? "1fr 1fr" : "1fr", gap: 20 }} className="fade-in">
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 22 }}>Missed Calls</h2>
                <span style={{ fontSize: 12, color: "#8a8a8a", fontWeight: 600 }}>{mockCalls.filter(c => c.status === "new" && !sentIds.includes(c.id)).length} need reply</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {mockCalls.map(call => {
                  const sent = sentIds.includes(call.id);
                  const isNew = call.status === "new" && !sent;
                  return (
                    <div key={call.id} className="card" onClick={() => !sent && generateReply(call)}
                      style={{ background: "#fff", borderRadius: 14, padding: "16px 18px", border: selectedCall?.id === call.id ? "2px solid #e8827a" : "2px solid #f0e8e4", display: "flex", alignItems: "center", gap: 14, cursor: sent ? "default" : "pointer", boxShadow: "0 2px 10px rgba(0,0,0,.04)", opacity: sent ? .6 : 1 }}>
                      <div style={{ width: 46, height: 46, borderRadius: "50%", background: isNew ? "#f5c4c0" : "#c8e6e4", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: isNew ? "#e8827a" : "#5b9e9a", flexShrink: 0 }}>{call.avatar}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <span style={{ fontWeight: 800, fontSize: 15 }}>{call.name}</span>
                          <span style={{ fontSize: 11, color: "#8a8a8a" }}>{call.time}</span>
                        </div>
                        <div style={{ fontSize: 13, color: "#8a8a8a", marginTop: 2 }}>{call.phone}</div>
                        {call.service && <div style={{ fontSize: 12, color: "#5b9e9a", fontWeight: 700, marginTop: 3 }}>🔧 {call.service}</div>}
                      </div>
                      <span style={{ background: sent ? "#c8e6e4" : isNew ? "#fdf0ee" : "#f5f5f5", color: sent ? "#5b9e9a" : isNew ? "#e8827a" : "#8a8a8a", fontSize: 11, fontWeight: 800, borderRadius: 8, padding: "4px 10px", flexShrink: 0 }}>
                        {sent ? "✓ Sent" : isNew ? "⚡ Reply" : "Replied"}
                      </span>
                    </div>
                  );
                })}
              </div>

            </div>

            {selectedCall && (
              <div className="fade-in" style={{ background: "#fff", borderRadius: 16, padding: 24, border: "2px solid #f5c4c0", boxShadow: "0 4px 24px rgba(232,130,122,.12)", height: "fit-content" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
                  <div style={{ width: 40, height: 40, borderRadius: "50%", background: "#f5c4c0", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: "#e8827a", fontSize: 13 }}>{selectedCall.avatar}</div>
                  <div>
                    <div style={{ fontWeight: 800 }}>{selectedCall.name}</div>
                    <div style={{ fontSize: 12, color: "#8a8a8a" }}>{selectedCall.phone}</div>
                  </div>
                  <button onClick={() => setSelectedCall(null)} style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", fontSize: 22, color: "#8a8a8a" }}>×</button>
                </div>
                <div style={{ fontSize: 11, fontWeight: 800, color: "#e8827a", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 10 }}>✨ Ellie's Reply</div>
                {isGenerating ? (
                  <div style={{ background: "#fdf0ee", borderRadius: 12, padding: 28, textAlign: "center" }}>
                    <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 10 }}>
                      {[0,1,2].map(i => <div key={i} className="dot" style={{ width: 8, height: 8, borderRadius: "50%", background: "#e8827a" }} />)}
                    </div>
                    <div style={{ color: "#8a8a8a", fontSize: 13, fontWeight: 600 }}>Ellie is writing the perfect message...</div>
                  </div>
                ) : (
                  <>
                    <textarea value={editedMsg} onChange={e => setEditedMsg(e.target.value)} rows={5}
                      style={{ width: "100%", border: "1.5px solid #f0e8e4", borderRadius: 12, padding: 14, fontSize: 14, fontFamily: "inherit", lineHeight: 1.6, resize: "vertical", background: "#fdf0ee", color: "#2d2d2d", outline: "none" }} />
                    <div style={{ fontSize: 11, color: editedMsg.length > 160 ? "#e05" : "#8a8a8a", textAlign: "right", marginTop: 4 }}>{editedMsg.length} chars</div>
                    <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
                      <button className="btn" onClick={() => generateReply(selectedCall)}
                        style={{ flex: 1, background: "#f5f5f5", border: "none", borderRadius: 10, padding: "11px 0", fontSize: 13, fontWeight: 700, color: "#8a8a8a", cursor: "pointer", fontFamily: "inherit" }}>
                        🔄 Redo
                      </button>
                      <button className="btn" onClick={() => { setSentIds(p => [...p, selectedCall.id]); setSelectedCall(null); }}
                        style={{ flex: 2, background: "#e8827a", border: "none", borderRadius: 10, padding: "11px 0", fontSize: 14, fontWeight: 800, color: "#fff", cursor: "pointer", fontFamily: "inherit" }}>
                        📤 Send via SMS
                      </button>
                    </div>

                  </>
                )}
              </div>
            )}
          </div>
        )}

        {activeTab === "leads" && (
          <div className="fade-in">
            <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 22, marginBottom: 20 }}>Lead Pipeline</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {leads.map((lead, i) => (
                <div key={i} style={{ background: "#fff", borderRadius: 14, padding: "16px 20px", border: "2px solid #f0e8e4", display: "flex", alignItems: "center", gap: 16, boxShadow: "0 2px 10px rgba(0,0,0,.04)" }}>
                  <div style={{ width: 46, height: 46, borderRadius: "50%", background: lead.status === "Hot" ? "#f5c4c0" : "#faf0d7", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>
                    {lead.status === "Hot" ? "🔥" : "🌡️"}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 800 }}>{lead.name}</div>
                    <div style={{ fontSize: 13, color: "#8a8a8a" }}>{lead.phone}</div>
                    <div style={{ fontSize: 12, color: "#5b9e9a", fontWeight: 700, marginTop: 2 }}>{lead.interest}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: "'Fraunces',serif", fontSize: 20, fontWeight: 700 }}>{lead.value}</div>
                    <span style={{ background: lead.status === "Hot" ? "#fdf0ee" : "#faf0d7", color: lead.status === "Hot" ? "#e8827a" : "#d4a847", fontSize: 11, fontWeight: 800, borderRadius: 8, padding: "3px 10px" }}>{lead.status}</span>
                  </div>
                  <button className="btn" style={{ background: "#e8827a", color: "#fff", border: "none", borderRadius: 10, padding: "9px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    Follow Up
                  </button>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 16, padding: 16, background: "#faf0d7", borderRadius: 12, fontSize: 13, color: "#8a6d20", fontWeight: 600 }}>
              💰 Ellie has identified <strong>$600+ in potential revenue</strong> from current leads. Reply to hot leads within 5 minutes to boost close rates by 80%.
            </div>
          </div>
        )}

        {activeTab === "faq" && (
          <div className="fade-in">
            <h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 22, marginBottom: 16 }}>Chat with Ellie</h2>
            <div style={{ background: "#fff", borderRadius: 16, border: "2px solid #f0e8e4", overflow: "hidden", display: "flex", flexDirection: "column", height: 500 }}>
              <div style={{ background: "#fdf0ee", padding: "12px 16px", borderBottom: "1px solid #f0e8e4", display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#e8827a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🌸</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 14 }}>Ellie</div>
                  <div style={{ fontSize: 11, color: "#5b9e9a", fontWeight: 700 }}>● Online — powered by Claude AI</div>
                </div>
              </div>
              <div style={{ flex: 1, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
                {chatMessages.map((msg, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", alignItems: "flex-end", gap: 8 }}>
                    {msg.role === "ellie" && <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#e8827a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>🌸</div>}
                    <div style={{ background: msg.role === "user" ? "#e8827a" : "#fdf0ee", color: msg.role === "user" ? "#fff" : "#2d2d2d", borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px", padding: "10px 14px", fontSize: 13, maxWidth: "75%", lineHeight: 1.5, fontWeight: 500 }}>
                      {msg.text}
                    </div>
                  </div>
                ))}
                {isChatting && (
                  <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#e8827a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🌸</div>
                    <div style={{ background: "#fdf0ee", borderRadius: "16px 16px 16px 4px", padding: "10px 16px", display: "flex", gap: 5 }}>
                      {[0,1,2].map(i => <div key={i} className="dot" style={{ width: 7, height: 7, borderRadius: "50%", background: "#e8827a" }} />)}
                    </div>
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>
              <div style={{ padding: 12, borderTop: "1px solid #f0e8e4", display: "flex", gap: 8 }}>
                <input value={chatInput} onChange={e => setChatInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && !e.shiftKey && handleChat()}
                  placeholder="Ask Ellie something a customer might ask..."
                  style={{ flex: 1, border: "1.5px solid #f0e8e4", borderRadius: 10, padding: "10px 14px", fontSize: 13, fontFamily: "inherit", outline: "none" }} />
                <button className="btn" onClick={handleChat} disabled={isChatting}
                  style={{ background: "#5b9e9a", color: "#fff", border: "none", borderRadius: 10, padding: "10px 18px", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                  Send
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Ellie />);
</script>
</body>
</html>
